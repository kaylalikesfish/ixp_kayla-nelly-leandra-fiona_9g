      display: grid;

      font-size: 0.85rem;
      opacity: 1;
      transition: opacity 0.35s ease;

    .side {

      border-radius: 16px;
      padding: 5px;

.posts {

  gap: 10px;
}

background: #cdefff;

  overflow: hidden;
}

.post img {

    .btn {

      border-radius: 999px;
      padding: 7px 16px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: bold;
    }
    .btn a {
  text-decoration: none;

<script>
const pages = {

  1: [
    {
      title: '1.1 Physical Quantities and Its Unit',
      text: `Physical quantities are measurable properties of matter, defined by a numerical magnitude and unit (for example, 5 centimeters).

Physical quantities are divided into two; base and derived quantities. There are 7 base quantities, which are:

<ol>
<li>Length (m)</li>
<li>Mass (kg)</li>
<li>Time (s)</li>
<li>Electric current (A)</li>
<li>Temperature (K)</li>
<li>Amount of substance (mol)</li>
<li>Luminous intensity (cd)</li>
</ol>

Derived quantities are formed by combining base quantities, such as speed (m/s), force (N), and density (kg/m³).`
    },
    {
      title: '1.2 Standard Form and Prefix',
      text: `Standard form expresses very large or small numbers as A × 10ⁿ.

Prefixes such as kilo (10³), centi (10⁻²), milli (10⁻³), and micro (10⁻⁶) make values easier to read.

For example, 0.001 m can be written as 1 mm.`
    }
  ],

  2: [
    {
      title: '1.3 Convert from One Unit to Another Unit',
      text: `Converting one unit to another requires using conversion factors.

Multiplying is required when converting from a larger unit to a smaller one, and dividing is used when converting from a smaller unit to a larger one.

Correct conversion of units is essential when doing experiments to ensure accuracy.`
    },
    {
      title: '1.4 Measuring Using Tools',
      text: `Measuring tools are tools used to quantify physical properties like length, volume, mass, and temperature.

<ol>
<li>Ruler / measuring tape</li>
<li>Vernier caliper</li>
<li>Balance</li>
<li>Measuring cylinder</li>
<li>Thermometer</li>
<li>Stopwatch</li>
</ol>`
    }
  ],

  3: [
    {
      title: 'Learning Video',
      text: `Watch this explanation:

<br><br>

<iframe width="100%" height="170"
src="https://www.youtube.com/embed/PD8xwnCUJA8?si=b4tjaZdp3naHD5OY"
style="border-radius:10px;border:2px solid #0b2545;"
allowfullscreen></iframe>

<br><br>

<a href="https://youtu.be/PD8xwnCUJA8?si=jM4trdOcBMMlrE2R" target="_blank">
Open on YouTube
</a>`
    },
    {
      title: 'Canva Slides',
      text: `View the presentation:

<br><br>

<iframe
src="https://www.canva.com/design/DAHCZg6kfZM/lA5Dgk55nX9_GIanAxBMaw/view?embed"
width="100%"
height="170"
style="border-radius:10px;border:2px solid #0b2545;">
</iframe>`
    }
  ]
};

let currentPage = 1;
  const chat = document.getElementById('chat');
  const buttons = document.querySelectorAll('.page-btn');

  function renderPage(page) {
    chat.innerHTML = '';
    pages[page].forEach(item => {
      chat.innerHTML += `<div class="bubble"><strong>${item.title}</strong><br>${item.text}</div>`;
    });
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const page = Number(btn.dataset.page);
      if (page === currentPage) return;

      chat.classList.add('fade');

      setTimeout(() => {
        currentPage = page;
        renderPage(page);
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        chat.classList.remove('fade');
      }, 350);
    });
  });

  renderPage(1);
</script>
